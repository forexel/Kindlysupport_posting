services:
  postgres:
    image: postgres:16-alpine
    container_name: kindlysupport_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kindlysupport}
      POSTGRES_USER: ${POSTGRES_USER:-kindly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kindlypass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kindly} -d ${POSTGRES_DB:-kindlysupport}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Host port is intentionally not published to avoid conflicts with other local Postgres instances.

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: kindlysupport_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio_init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: kindlysupport_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb -p local/${MINIO_BUCKET:-kindlysupport-media} || true &&
      mc anonymous set download local/${MINIO_BUCKET:-kindlysupport-media} || true
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kindlysupport_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kindly}:${POSTGRES_PASSWORD:-kindlypass}@postgres:5432/${POSTGRES_DB:-kindlysupport}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      APP_SECURE_COOKIES: ${APP_SECURE_COOKIES:-0}
    ports:
      - "${APP_PORT:-18210}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
