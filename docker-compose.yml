services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kindlysupport_app
    restart: unless-stopped
    init: true
    mem_limit: ${APP_MEM_LIMIT:-768m}
    memswap_limit: ${APP_MEMSWAP_LIMIT:-1g}
    pids_limit: ${APP_PIDS_LIMIT:-256}
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_ME_STRONG_PASSWORD}
      APP_SECURE_COOKIES: ${APP_SECURE_COOKIES:-0}
      STORAGE_MODE: ${STORAGE_MODE:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-apps-infra-minio-1:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-CHANGE_ME_MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-CHANGE_ME_MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-kindlysupport-media}
      MINIO_SECURE: ${MINIO_SECURE:-0}
      INSTAGRAM_PROXY_URL: ${INSTAGRAM_PROXY_URL:-}
    ports:
      - "${APP_PORT:-18210}:8000"
    networks:
      - default
      - apps_infra
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

networks:
  apps_infra:
    external: true
    name: apps-net
